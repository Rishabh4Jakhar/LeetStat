<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta content="Leet Stats" property="og:title">
  <meta content="Display leetcode stats of Friends' profiles" property="og:description">
  <meta content="https://rishabh4jakhar.github.io/LeetStat/" property="og:url">
  <meta content="#e89609" data-react-helmet="true" name="theme-color">  
  <title>Leetcode Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Leetcode Stats</h1>
  <div class="controls">
  <label for="sortSelect">Sort by:</label>
  <select id="sortSelect">
    <option value="default">Custom</option>
    <option value="total">Most Solved</option>
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
    <option value="streak">Longest Streak</option>
  </select>
  </div>  
  <div id="profiles" class="card-container"></div>

  <script src="script.js"></script>
</body>
</html>
